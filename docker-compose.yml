services:

  postgres:
    image: postgres:15
    container_name: ecommerce_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5442:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: ecommerce_mongodb
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_DATABASE: ecommerce_analytics

  airflow-init:
    image: apache/airflow:2.9.0
    container_name: ecommerce_airflow_init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "airflow db migrate &&
               airflow users create --username admin --password admin --firstname Admin --lastname Admin --role Admin --email admin@admin.com || true"

  airflow:
    image: apache/airflow:2.9.0
    container_name: ecommerce_airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__WEB_SERVER_PORT: '8080'
      AIRFLOW__WEBSERVER__WORKERS: '1'
      AIRFLOW__WEBSERVER__WORKER_TIMEOUT: '300'
      AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: '300'
    ports:
      - "8183:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./data:/opt/airflow/data
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: >
      bash -c "pip install pymongo --quiet &&
               sleep 15 &&
               airflow webserver --port 8080 --workers 1 & airflow scheduler"

  jenkins:
    image: jenkins/jenkins:lts
    container_name: ecommerce_jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - ./dags:/opt/airflow/dags
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false -Xmx256m -Xms128m"

volumes:
  postgres_data:
  mongodb_data:
  jenkins_home:
